<!DOCTYPE html>
<html>
<head>
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/565/565547.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/static/style.css">
<title>AuthShield Login</title>
</head>
<body>
<h1>🔐AuthShield</h1>
<div class="box">
<center><h2>Login</h2></center>

<form method="POST">
    <input name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Login</button>
</form>

<p>{{ message }}</p>

{% if remaining_time is defined and remaining_time > 0 %}
<p>Try again in <span id="countdown">{{ remaining_time }}</span> seconds</p>
{% endif %}
<p>Don't have account? <a href="/signup"> Create Account</a></p>

</div>
<!-- Countdown Timer -->
<script>
let timeLeft = "{{ remaining_time }}" || 0;
timeLeft = parseInt(timeLeft);

if (timeLeft > 0) {
    let countdownElement = document.getElementById("countdown");

    let timer = setInterval(function() {
        timeLeft--;
        countdownElement.innerText = timeLeft;

        if (timeLeft <= 0) {
            clearInterval(timer);
            countdownElement.innerText = "Try now!";
        }
    }, 1000);
}
</script>
</body>
</html>
